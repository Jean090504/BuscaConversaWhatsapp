<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP Conversas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-slate-300 font-sans h-screen flex overflow-hidden">

    <aside class="w-64 bg-[#1e293b] border-r border-slate-700 flex flex-col">
        <div class="p-6 border-b border-slate-700 flex items-center gap-3">
            <div class="bg-indigo-500 p-2 rounded-lg text-white">
                <i class="fas fa-database"></i>
            </div>
            <span class="font-bold text-white tracking-tight">APP Conversas</span>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <p class="text-xs font-semibold text-slate-500 uppercase px-2 mb-4">Módulos</p>
            <a href="" class="flex items-center gap-3 p-3 bg-indigo-600/10 text-indigo-400 rounded-lg border border-indigo-600/20">
                <i class="fas fa-terminal"></i> Logs de Conversa
            </a>
        </nav>

        <div class="p-4 border-t border-slate-700">
            <div class="flex items-center gap-3 p-2 bg-slate-800/50 rounded-lg">
                <div class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center text-xs text-white">JC</div>
                <div class="text-xs">
                    <p class="text-white font-medium">Jean Costa</p>
                    <p class="text-slate-500">Operador</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 bg-[#1e293b]/50 backdrop-blur-md border-b border-slate-700 flex items-center justify-between px-8">
            <h2 class="text-white font-semibold">Visualização de Dados em Tempo Real</h2>
            <div class="flex items-center gap-4">
                <span class="flex items-center gap-2 text-xs text-green-400 bg-green-400/10 px-3 py-1 rounded-full border border-green-400/20">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    API Online (Render)
                </span>
            </div>
        </header>

        <div class="p-8 overflow-y-auto space-y-6">
            
            <div class="grid grid-cols-3 gap-6">
                <div class="bg-[#1e293b] p-6 rounded-xl border border-slate-700">
                    <p class="text-slate-500 text-sm">Total de Registros</p>
                    <h3 id="total-contatos" class="text-3xl font-bold text-white mt-1">--</h3>
                </div>
                <div class="bg-[#1e293b] p-6 rounded-xl border border-slate-700">
                    <p class="text-slate-500 text-sm">Última Consulta</p>
                    <h3 class="text-3xl font-bold text-white mt-1">Hoje</h3>
                </div>
            </div>

            <div class="bg-[#1e293b] rounded-xl border border-slate-700 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-slate-400 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-4">Usuário / Nickname</th>
                            <th class="px-6 py-4">Status / Bio</th>
                            <th class="px-6 py-4">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela" class="divide-y divide-slate-700 text-sm">
                        </tbody>
                </table>
            </div>
        </div>

       <div id="detalhes-container" class="hidden animate__animated animate__fadeIn space-y-6 mt-8">
    
            <div class="flex justify-between items-center bg-[#1e293b] p-4 rounded-xl border border-slate-700 shadow-lg">
                <div class="flex items-center gap-4">
                    <div id="user-detail-icon" class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold">
                        </div>
                    <div>
                        <h3 id="user-detail-name" class="text-white font-bold leading-none uppercase tracking-tighter">Console de Operações</h3>
                        <p class="text-[10px] text-slate-500 mt-1 uppercase">Monitoramento de Fluxo Ativo</p>
                    </div>
                </div>
                <button onclick="fecharDetalhes()" class="p-2 hover:bg-red-500/10 hover:text-red-500 rounded-lg transition-all group">
                    <i class="fas fa-times group-hover:rotate-90 transition-transform"></i>
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 min-h-[500px]">
                <div class="lg:col-span-4 bg-[#1e293b] rounded-xl border border-slate-700 p-6 flex flex-col h-full">
                    <h3 class="text-white font-bold mb-6 flex items-center gap-2 text-sm uppercase tracking-widest border-b border-slate-700 pb-3">
                        <i class="fas fa-address-book text-indigo-400"></i> Contatos
                    </h3>
                    <ul id="lista-contatos-detalhe" class="space-y-3 overflow-y-auto flex-1 custom-scrollbar"></ul>
                </div>

                <div class="lg:col-span-8 bg-[#1e293b] rounded-xl border border-slate-700 p-6 flex flex-col h-full">
                    <h3 class="text-white font-bold mb-6 flex items-center gap-2 text-sm uppercase tracking-widest border-b border-slate-700 pb-3">
                        <i class="fas fa-history text-indigo-400"></i> Histórico de Mensagens
                    </h3>
                    <div id="log-mensagens" class="flex-1 space-y-4 overflow-y-auto pr-2 custom-scrollbar">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
