<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP Conversas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-slate-300 font-sans h-screen flex overflow-hidden">

    <aside class="w-64 bg-[#1e293b] border-r border-slate-700 flex flex-col">
        <div class="p-6 border-b border-slate-700 flex items-center gap-3">
            <div class="bg-indigo-500 p-2 rounded-lg text-white">
                <i class="fas fa-database"></i>
            </div>
            <span class="font-bold text-white tracking-tight">APP Conversas</span>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <p class="text-xs font-semibold text-slate-500 uppercase px-2 mb-4">Módulos</p>
            <a href="" class="flex items-center gap-3 p-3 bg-indigo-600/10 text-indigo-400 rounded-lg border border-indigo-600/20">
                <i class="fas fa-terminal"></i> Logs de Conversa
            </a>
        </nav>

        <div class="p-4 border-t border-slate-700">
            <div class="flex items-center gap-3 p-2 bg-slate-800/50 rounded-lg">
                <div class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center text-xs text-white">JC</div>
                <div class="text-xs">
                    <p class="text-white font-medium">Jean Costa</p>
                    <p class="text-slate-500">Operador</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-[#1e293b]/50 backdrop-blur-md border-b border-slate-700 flex items-center justify-between px-8 shrink-0">
            <h2 class="text-white font-semibold">Visualização de Dados em Tempo Real</h2>
            <div class="flex items-center gap-6">
                <div class="relative hidden md:block">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                    <input type="text" id="input-busca-global" placeholder="Procurar palavra-chave..." 
                        class="bg-slate-900/50 border border-slate-700 rounded-lg pl-9 pr-4 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500 transition-all w-64">
                </div>
                <span class="text-xs text-green-400 bg-green-400/10 px-3 py-1 rounded-full border border-green-400/20">API Online</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-8 space-y-6 relative">
            
            <div id="view-tabela" class="space-y-6 transition-all duration-500">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="bg-[#1e293b] p-6 rounded-xl border border-slate-700 shadow-lg">
                        <p class="text-slate-500 text-xs uppercase font-bold tracking-widest">Total de Usuários</p>
                        <h3 id="total-contatos" class="text-3xl font-black text-white mt-2">--</h3>
                    </div>
                    <div class="bg-[#1e293b] p-6 rounded-xl border border-slate-700 shadow-lg">
                        <p class="text-slate-500 text-xs uppercase font-bold tracking-widest">Status do Nó</p>
                        <h3 class="text-3xl font-black text-green-500 mt-2">Ativo</h3>
                    </div>
                </div>

                <div class="bg-[#1e293b] rounded-xl border border-slate-700 overflow-hidden shadow-2xl">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-800/50 text-slate-400 text-[10px] uppercase tracking-[0.2em] font-black">
                                <tr>
                                    <th class="px-6 py-4">Operador / ID</th>
                                    <th class="px-6 py-4">Bio / Descrição</th>
                                    <th class="px-6 py-4 text-center">Ações de Monitoramento</th>
                                </tr>
                            </thead>
                            <tbody id="corpo-tabela" class="divide-y divide-slate-700/50 text-sm">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="detalhes-container" class="hidden absolute inset-0 bg-[#0f172a] z-20 p-4 sm:p-8 flex flex-col space-y-6 animate__animated animate__fadeIn">
                <div class="flex justify-between items-center bg-[#1e293b] p-4 rounded-xl border border-slate-700">
                    <div class="flex items-center gap-4">
                        <div id="user-avatar-current" class="w-12 h-12 rounded-full border-2 border-indigo-500 overflow-hidden bg-slate-800"></div>
                        <div>
                            <h3 id="user-detail-name" class="text-white font-black uppercase tracking-tighter text-lg leading-none">Console</h3>
                            <span id="user-detail-number" class="text-[10px] text-slate-500 mono font-bold">--</span>
                        </div>
                    </div>
                    <button onclick="fecharDetalhes()" class="px-4 py-2 bg-slate-800 hover:bg-red-500/20 hover:text-red-500 text-slate-400 rounded-lg transition-all text-xs font-bold uppercase tracking-widest border border-slate-700">
                        <i class="fas fa-arrow-left mr-2"></i> Voltar ao Dashboard
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1 min-h-0">
                    <div class="lg:col-span-4 bg-[#1e293b] rounded-xl border border-slate-700 p-6 flex flex-col min-h-0 shadow-xl">
                        <h4 class="text-indigo-400 text-[10px] font-black uppercase tracking-[0.3em] mb-4">Network_Links</h4>
                        <ul id="lista-contatos-detalhe" class="flex-1 overflow-y-auto space-y-2 pr-2 custom-scrollbar"></ul>
                    </div>

                    <div class="lg:col-span-8 bg-[#1e293b] rounded-xl border border-slate-700 p-6 flex flex-col min-h-0 shadow-xl">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="text-indigo-400 text-[10px] font-black uppercase tracking-[0.3em]">Data_Stream_Logs</h4>
                            <span id="status-conversa" class="text-[9px] text-slate-600 italic">IDLE</span>
                        </div>
                        <div id="log-mensagens" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scrollbar scroll-smooth bg-slate-900/30 rounded-lg p-4 border border-slate-800/50">
                            </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
