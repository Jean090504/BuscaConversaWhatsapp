<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA // DASHBOARD OPERACIONAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Slate 50 */
            color: #1e293b; /* Slate 800 */
        }

        /* Scrollbar Suave e Moderna */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Card Soft Shadow */
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .active-nav {
            background-color: #eff6ff;
            color: #2563eb;
            border-right: 3px solid #2563eb;
        }

        /* Realce de contraste para mensagens */
        .msg-bubble {
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .text-content {
            line-height: 1.6;
            font-size: 0.875rem; /* 14px */
            color: #1e293b; /* Slate 800 para leitura máxima */
        }

        .sender-name {
            letter-spacing: 0.05em;
            font-weight: 800;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-50">
        <div class="p-6 flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i class="fas fa-layer-group text-lg"></i>
            </div>
            <span class="font-bold text-slate-800 tracking-tight text-lg">InsightCenter</span>
        </div>

        <nav class="flex-1 px-4 mt-4 space-y-1">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest px-3 mb-2">Menu Principal</p>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 active-nav rounded-lg font-medium text-sm transition-all">
                <i class="fas fa-chart-pie w-5"></i> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-lg font-medium text-sm transition-all">
                <i class="fas fa-users w-5"></i> Usuários
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-lg font-medium text-sm transition-all">
                <i class="fas fa-comment-dots w-5"></i> Mensagens
            </a>
        </nav>

        <div class="p-6 border-t border-slate-100">
            <div class="flex items-center gap-3 p-2 rounded-xl bg-slate-50">
                <div class="w-9 h-9 rounded-full bg-indigo-100 border border-indigo-200 flex items-center justify-center text-xs font-bold text-indigo-700">JC</div>
                <div class="overflow-hidden">
                    <p class="text-slate-900 text-xs font-bold truncate">Jean Costa</p>
                    <p class="text-[10px] text-slate-500 font-medium">Administrador</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-4">
                <h2 class="text-slate-800 font-semibold text-base">Monitoramento de Contatos</h2>
                <span class="px-2 py-0.5 bg-green-100 text-green-700 text-[10px] font-bold rounded-md uppercase tracking-wide">Servidor Online</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="relative group">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                    <input type="text" id="input-busca-global" placeholder="Pesquisar conversas..." 
                        class="bg-slate-50 border border-slate-200 rounded-lg pl-9 pr-4 py-1.5 text-xs text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all w-64">
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-hidden relative p-8">
            
            <div id="view-tabela" class="h-full overflow-y-auto space-y-8 animate__animated animate__fadeIn">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl card-shadow flex items-center gap-5">
                        <div class="w-12 h-12 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center">
                            <i class="fas fa-address-book text-xl"></i>
                        </div>
                        <div>
                            <p class="text-slate-500 text-xs font-medium uppercase tracking-wider">Total de Registros</p>
                            <h3 id="total-contatos" class="text-2xl font-bold text-slate-800">--</h3>
                        </div>
                    </div>
                    </div>

                <div class="bg-white rounded-2xl card-shadow overflow-hidden">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                        <h4 class="text-sm font-bold text-slate-800">Lista de Operadores</h4>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-500 text-[11px] font-bold uppercase tracking-wider border-b border-slate-100">
                                <tr>
                                    <th class="px-6 py-4">Usuário</th>
                                    <th class="px-6 py-4">Bio / Descrição</th>
                                    <th class="px-6 py-4 text-right">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="corpo-tabela" class="divide-y divide-slate-100 text-sm">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="detalhes-container" class="hidden absolute inset-0 bg-slate-50/95 backdrop-blur-sm z-50 p-8 flex flex-col space-y-6 animate__animated animate__slideInUp">
                
                <div class="flex justify-between items-center bg-white p-6 rounded-2xl card-shadow">
                    <div class="flex items-center gap-4">
                        <div class="bg-slate-100 px-4 py-2 rounded-xl border border-slate-200">
                            <h3 id="user-detail-name" class="text-lg font-bold text-slate-800 leading-none">Indefinido</h3>
                            <p id="user-detail-number" class="text-[10px] text-slate-500 font-mono mt-1">--</p>
                        </div>
                    </div>
                    <button onclick="fecharDetalhes()" class="px-4 py-2 bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 rounded-lg text-xs font-bold transition-all flex items-center gap-2 shadow-sm">
                        <i class="fas fa-times"></i> Fechar Detalhes
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1 min-h-0">
                    <div class="lg:col-span-4 bg-white rounded-2xl p-6 flex flex-col min-h-0 card-shadow">
                        <h4 class="text-slate-400 text-[11px] font-bold uppercase tracking-widest mb-4">Contatos Vinculados</h4>
                        <ul id="lista-contatos-detalhe" class="flex-1 overflow-y-auto space-y-2 pr-2 custom-scrollbar"></ul>
                    </div>

                    <div class="lg:col-span-8 bg-white rounded-2xl p-6 flex flex-col min-h-0 card-shadow">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="text-slate-400 text-[11px] font-bold uppercase tracking-widest">Logs de Conversa</h4>
                            <span id="status-conversa" class="text-[10px] text-indigo-500 font-bold bg-indigo-50 px-2 py-1 rounded-md">Pronto</span>
                        </div>
                        <div id="log-mensagens" class="flex-1 overflow-y-auto space-y-4 pr-3 custom-scrollbar bg-slate-50 rounded-xl p-4 border border-slate-100">
                            </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
